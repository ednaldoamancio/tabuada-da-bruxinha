<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabuada da Bruxinha - Conquistas Individuais</title>
    <style>
        /* (mesmos estilos anteriores, sem alterações) */
        :root { 
            --hw-orange: #ff9900; 
            --hw-purple: #2e0249; 
            --neon-green: #39ff14; 
            --neon-red: #ff3131;
            --bg-filter: brightness(1);
        }
        
        body.dark-mode {
            --hw-orange: #b36b00;
            --neon-green: #25a10d;
            --bg-filter: brightness(0.4) grayscale(0.3);
            color: #ccc;
        }

        body { 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #000; color: white; 
            overflow: hidden; 
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            touch-action: none; 
        }
        
        #game-wrapper { 
            width: 100%; height: 100%; position: relative; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: filter 0.3s;
            overflow: hidden;
        }

        #bg-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: 1; transform: translate(-50%, -50%);
            object-fit: cover; filter: var(--bg-filter);
            pointer-events: none;
        }

        .screen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.3s;
        }

        .top-bar {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            display: flex; gap: 15px;
        }
        
        .icon-btn {
            background: rgba(0, 0, 0, 0.6); border: 2px solid var(--hw-orange); color: white;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            font-size: 24px; display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s; user-select: none;
        }
        .icon-btn:hover { transform: scale(1.1); background: var(--hw-orange); color: black; }

        .menu-box {
            background: rgba(46, 2, 73, 0.9);
            border: 4px solid var(--hw-orange);
            padding: 25px; border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 153, 0, 0.5);
            text-align: center; max-width: 90%;
            backdrop-filter: blur(8px);
        }

        #ui { position: absolute; top: 8%; width: 100%; text-align: center; z-index: 20; pointer-events: none; }
        #question { font-size: 8vh; font-weight: bold; color: var(--hw-orange); text-shadow: 4px 4px #000; margin: 0; }
        
        .answer-box { 
            font-size: 6vh; width: 30vw; max-width: 250px; height: 9vh; line-height: 9vh;
            text-align: center; border-radius: 15px; border: 4px solid var(--hw-orange); 
            background: rgba(0,0,0,0.85); color: white; margin: 1vh auto;
            transition: all 0.3s; pointer-events: none; user-select: none;
        }
        
        .answer-reveal {
            color: var(--neon-red) !important;
            border-color: var(--neon-red) !important;
            text-shadow: 0 0 12px var(--neon-red), 0 0 24px var(--neon-red);
            animation: blink-neon 0.5s infinite alternate;
        }

        @keyframes blink-neon {
            from { opacity: 1;   transform: scale(1);    }
            to   { opacity: 0.3; transform: scale(1.06); }
        }

        #feedback { font-size: 4vh; font-weight: bold; height: 6vh; margin-top: 1vh; text-shadow: 2px 2px #000; }
        .stats { position: absolute; top: 20px; right: 20px; font-size: 3vh; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 20px; z-index: 20; border: 1px solid var(--hw-orange); }

        #numpad {
            position: absolute; bottom: 5%; right: 5%;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            background: rgba(46, 2, 73, 0.7); padding: 12px; border-radius: 15px;
            border: 2px solid var(--hw-orange); backdrop-filter: blur(10px); z-index: 30;
        }
        .num-key {
            background: rgba(0,0,0,0.8); color: white; border: 2px solid var(--hw-orange);
            width: 7.5vh; height: 7.5vh; font-size: 3vh; border-radius: 10px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; transition: 0.1s; user-select: none;
        }
        .num-key:active { background: var(--hw-orange); color: black; transform: scale(0.9); }
        .num-key.enter { background: var(--neon-green); color: black; }

        #witch { 
            position: absolute; width: 22vh; bottom: 50%; left: 10%; 
            transition: bottom 0.5s ease-out; z-index: 15; filter: drop-shadow(4px 4px 8px black);
        }

        .btn { 
            background: var(--hw-orange); border: none; padding: 12px 30px; font-size: 2.2vh; 
            cursor: pointer; border-radius: 50px; margin: 8px; font-weight: bold; color: black; 
            box-shadow: 0 4px #cc7a00; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.05); background: #ffaa33; }
        
        #master-effect {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 200; display: none;
            background: radial-gradient(circle, transparent 30%, rgba(255, 153, 0, 0.2) 100%);
        }

        .ranking-table, .achievements-table, .players-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 1.8vh; }
        .ranking-table td, .achievements-table td, .players-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .rank-pos, .achieve-name, .player-name { color: var(--hw-orange); font-weight: bold; }
        .rank-score { color: var(--neon-green); text-align: right; font-weight: bold; }
        .achieve-unlocked { color: var(--neon-green); text-align: center; }
        .achieve-locked { color: #888; text-align: center; }
        .achieve-progress { font-size: 1.4vh; color: #aaa; }
        .clickable-name { cursor: pointer; transition: 0.2s; }
        .clickable-name:hover { text-decoration: underline; transform: scale(1.02); }

        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 3px solid gold;
            border-radius: 30px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 300;
            font-size: 2.2vh;
            font-weight: bold;
            color: gold;
            backdrop-filter: blur(8px);
            animation: fadeInUp 0.5s ease-out, fadeOut 0.5s ease-in 4.5s forwards;
            pointer-events: none;
        }
        .toast-notification span {
            font-size: 3vh;
        }
        @keyframes fadeInUp {
            from { bottom: 0; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
        .player-name-input {
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--neon-green);
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 2vh;
            text-align: center;
            text-transform: uppercase;
            width: 80%;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div id="master-effect"></div>
<div id="toast-area"></div>

<div id="game-wrapper">
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fundo_halloween.mp4" type="video/mp4">
    </video>

    <div class="top-bar">
        <div id="btn-audio" class="icon-btn" onclick="toggleAudio()" title="Áudio">🔊</div>
        <div id="btn-full" class="icon-btn" onclick="toggleFullscreen()" title="Tela Cheia">⛶</div>
        <div id="btn-night" class="icon-btn" onclick="toggleNightMode()" title="Modo Noturno">🌙</div>
    </div>

    <div id="menu" class="screen">
        <div class="menu-box">
            <h1 style="color:var(--hw-orange); margin:0; font-size: 4vh;">🎃 EdHumanas 🎃</h1>
            <p style="margin-bottom:20px; font-size: 2.5vh;">Tabuada da Bruxinha</p>
            <input type="text" id="player-name-input" class="player-name-input" placeholder="DIGITE SEU NOME" maxlength="12" autocomplete="off">
            <select id="tabuada-select" style="width: 85%; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 2vh;"></select>
            <div style="margin: 15px 0; font-size: 2vh;">
                <label><input type="radio" name="ordem" value="seq" checked> Sequencial</label>
                <label style="margin-left:15px;"><input type="radio" name="ordem" value="rand"> Aleatória</label>
            </div>
            <button class="btn" id="btn-start">INICIAR MISSÃO</button>
            <br>
            <button class="btn" style="background:#4b0082; color:white; font-size: 2vh;" id="btn-ranking">🏆 RANKING</button>
            <button class="btn" style="background:#ffaa33; color:black; font-size: 2vh;" id="btn-achievements">🏅 CONQUISTAS</button>
        </div>
    </div>

    <div id="game-container" class="screen" style="display:none;">
        <div class="stats">Pontos: <span id="display-score">0</span></div>
        <div id="ui">
            <div id="question">--</div>
            <div id="answer-display" class="answer-box">?</div>
            <div id="feedback"></div>
        </div>

        <div id="numpad">
            <div class="num-key" onclick="handleNumpad('7')">7</div>
            <div class="num-key" onclick="handleNumpad('8')">8</div>
            <div class="num-key" onclick="handleNumpad('9')">9</div>
            <div class="num-key" onclick="handleNumpad('4')">4</div>
            <div class="num-key" onclick="handleNumpad('5')">5</div>
            <div class="num-key" onclick="handleNumpad('6')">6</div>
            <div class="num-key" onclick="handleNumpad('1')">1</div>
            <div class="num-key" onclick="handleNumpad('2')">2</div>
            <div class="num-key" onclick="handleNumpad('3')">3</div>
            <div class="num-key" onclick="handleNumpad('0')">0</div>
            <div class="num-key" onclick="handleNumpad('DEL')">←</div>
            <div class="num-key enter" onclick="handleNumpad('ENTER')">OK</div>
        </div>

        <img id="witch" src="bruxinha.gif" alt="Bruxinha">
    </div>

    <div id="modal-overlay" class="screen" style="display:none; background: rgba(0,0,0,0.95);">
        <div class="menu-box" id="modal-content">
            <h2 id="modal-title" style="font-size: 4vh;">Fim de Jogo</h2>
            <div id="stats-summary">
                <p id="modal-details" style="font-size: 2.5vh;"></p>
                <div id="bonus-badge" style="display:none; color:black; background: var(--neon-green); font-weight:bold; margin: 10px; border: 2px solid white; padding: 10px; border-radius: 10px; font-size: 2.2vh;">✨ BÓNUS DE MESTRE: +5000 ✨</div>
                <div id="perfect-badge" style="display:none; color:black; background: #ffaa00; font-weight:bold; margin: 10px; border: 2px solid white; padding: 10px; border-radius: 10px; font-size: 2.2vh;">🎯 PERFEIÇÃO! +1000 BÓNUS 🎯</div>
            </div>
            <div id="highscore-input-area" style="margin-top:20px;">
                <p style="font-size:2vh;">Seu nome: <strong id="current-player-name-display"></strong></p>
                <button class="btn" onclick="saveScore()">SALVAR NO RANKING</button>
            </div>
            <div id="ranking-view" style="display:none;">
                <h3 style="color:var(--hw-orange)">🏆 CLASSIFICAÇÃO GERAL 🏆</h3>
                <table class="ranking-table" id="ranking-table"></table>
                <br>
                <button class="btn" onclick="showPlayerList()">VER CONQUISTAS DOS JOGADORES</button>
                <button class="btn" onclick="returnToMenu()">VOLTAR AO INÍCIO</button>
            </div>
            <div id="players-list-view" style="display:none;">
                <h3 style="color:var(--hw-orange)">👥 ESCOLHA UM JOGADOR</h3>
                <table class="players-table" id="players-table"></table>
                <br>
                <button class="btn" onclick="backToRanking()">VOLTAR AO RANKING</button>
                <button class="btn" onclick="returnToMenu()">MENU PRINCIPAL</button>
            </div>
            <div id="achievements-view" style="display:none;">
                <h3 id="achievements-player-name" style="color:var(--hw-orange)">🏅 CONQUISTAS</h3>
                <table class="achievements-table" id="achievements-table"></table>
                <br>
                <button class="btn" onclick="showPlayerList()">◀ VOLTAR PARA JOGADORES</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== SISTEMA DE CONQUISTAS POR JOGADOR ====================
    const defaultAchievements = {
        iniciante: { name: "🌟 Iniciante", desc: "Complete sua primeira partida", unlocked: false, date: null },
        perfeicao: { name: "🎯 Perfeição", desc: "Complete uma tabuada normal sem erros", unlocked: false, date: null },
        varredeira: { name: "🧹 Varredeira", desc: "Complete 5 tabuadas diferentes sem erros", unlocked: false, date: null, progress: 0, needed: 5 },
        relampago: { name: "⚡ Relâmpago", desc: "Responder 5 questões em menos de 3s cada (média)", unlocked: false, date: null },
        resiliente: { name: "💪 Resiliente", desc: "Errar a mesma questão 2 vezes e depois acertar", unlocked: false, date: null },
        mestre_supremo: { name: "🦉 Mestre Supremo", desc: "Completar a Jornada Mestre sem erros", unlocked: false, date: null },
        lendaria: { name: "👑 Lendária", desc: "Acumular 50.000 pontos no total (pontuação individual)", unlocked: false, date: null, progress: 0, needed: 50000 },
        fa_audio: { name: "🔊 Fã de Áudio", desc: "Jogar 10 partidas com som ligado", unlocked: false, date: null },
        noturna: { name: "🌙 Noturna", desc: "Completar uma partida no modo noturno", unlocked: false, date: null },
        mestra_completa: { name: "🎓 Mestra Completa", desc: "Desbloquear todas as outras conquistas", unlocked: false, date: null }
    };

    function getAchievementsForPlayer(playerName) {
        const key = `bruxinha_achievements_${playerName.toUpperCase()}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                const merged = { ...defaultAchievements };
                for (let a in data) {
                    if (merged[a]) {
                        merged[a].unlocked = data[a].unlocked;
                        merged[a].date = data[a].date;
                        if (merged[a].progress !== undefined && data[a].progress !== undefined)
                            merged[a].progress = data[a].progress;
                    }
                }
                return merged;
            } catch(e) { return { ...defaultAchievements }; }
        }
        return { ...defaultAchievements };
    }

    function saveAchievementsForPlayer(playerName, achievements) {
        const key = `bruxinha_achievements_${playerName.toUpperCase()}`;
        localStorage.setItem(key, JSON.stringify(achievements));
    }

    function unlockAchievementForPlayer(playerName, id, showToast = true) {
        if (!playerName) return;
        let ach = getAchievementsForPlayer(playerName);
        if (!ach[id].unlocked) {
            ach[id].unlocked = true;
            ach[id].date = new Date().toISOString();
            saveAchievementsForPlayer(playerName, ach);
            if (showToast && audioEnabled) {
                showAchievementToast(ach[id].name);
                const conquerSound = new Audio('conquista.mp3');
                conquerSound.play().catch(e=>console.log("sem som de conquista"));
            }
            let allUnlocked = true;
            for (let k in ach) {
                if (k !== 'mestra_completa' && !ach[k].unlocked) {
                    allUnlocked = false;
                    break;
                }
            }
            if (allUnlocked && !ach.mestra_completa.unlocked) {
                ach.mestra_completa.unlocked = true;
                ach.mestra_completa.date = new Date().toISOString();
                saveAchievementsForPlayer(playerName, ach);
                if (showToast && audioEnabled) {
                    showAchievementToast(ach.mestra_completa.name);
                    const conquerSound = new Audio('conquista.mp3');
                    conquerSound.play().catch(e=>{});
                }
            }
        }
    }

    function updateVarredeiraProgress(playerName, modalidadeKey) {
        if (!playerName) return;
        let ach = getAchievementsForPlayer(playerName);
        if (ach.varredeira.unlocked) return;
        let perfectTables = JSON.parse(localStorage.getItem(`perfect_tables_${playerName.toUpperCase()}`) || '[]');
        if (!perfectTables.includes(modalidadeKey)) {
            perfectTables.push(modalidadeKey);
            localStorage.setItem(`perfect_tables_${playerName.toUpperCase()}`, JSON.stringify(perfectTables));
        }
        ach.varredeira.progress = perfectTables.length;
        if (ach.varredeira.progress >= ach.varredeira.needed) {
            ach.varredeira.unlocked = true;
            ach.varredeira.date = new Date().toISOString();
            if (audioEnabled) {
                const conquerSound = new Audio('conquista.mp3');
                conquerSound.play().catch(e=>{});
                showAchievementToast(ach.varredeira.name);
            }
        }
        saveAchievementsForPlayer(playerName, ach);
    }

    // Função corrigida: agora o progresso é baseado nos pontos individuais do jogador (passados como parâmetro)
    function updateLendariaProgress(playerName, playerTotalPoints) {
        if (!playerName) return;
        let ach = getAchievementsForPlayer(playerName);
        ach.lendaria.progress = playerTotalPoints;
        if (playerTotalPoints >= ach.lendaria.needed && !ach.lendaria.unlocked) {
            ach.lendaria.unlocked = true;
            ach.lendaria.date = new Date().toISOString();
            if (audioEnabled) {
                const conquerSound = new Audio('conquista.mp3');
                conquerSound.play().catch(e=>{});
                showAchievementToast(ach.lendaria.name);
            }
        }
        saveAchievementsForPlayer(playerName, ach);
    }

    function showAchievementToast(achieveName) {
        const toastArea = document.getElementById('toast-area');
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.innerHTML = `<span>🏅</span> CONQUISTA DESBLOQUEADA!<br>${achieveName}`;
        toastArea.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }

    // ==================== ÁUDIO, VÍDEO E UTILITÁRIOS ====================
    const video = document.getElementById('bg-video');
    video.addEventListener('timeupdate', function() { 
        if(this.currentTime > this.duration - 0.15) {
            this.currentTime = 0;
            this.play();
        } 
    });

    let audioEnabled = true;
    const bgMusic = new Audio('musica.mp3'); bgMusic.loop = true; bgMusic.volume = 0.5;
    const sfxWin = new Audio('vitoria.mp3');
    const sfxLose = new Audio('derrota.mp3');
    const sfxCrash = new Audio('crash.mp3');

    const correctSounds = [
        new Audio('beleza.mp3'),
        new Audio('muitobem.mp3'),
        new Audio('muitobom.mp3'),
        new Audio('sensacional.mp3'),
        new Audio('otimo.mp3')
    ];
    const errorSounds = [
        new Audio('quepena.mp3'),
        new Audio('naofoi.mp3'),
        new Audio('praticando.mp3'),
        new Audio('tente.mp3')
    ];

    function playRandomCorrectSound() {
        if (!audioEnabled) return;
        const randomIndex = Math.floor(Math.random() * correctSounds.length);
        const sound = correctSounds[randomIndex];
        sound.currentTime = 0;
        sound.play().catch(e => console.log("Erro ao tocar som de acerto:", e));
    }

    function playRandomErrorSound() {
        if (!audioEnabled) return;
        const randomIndex = Math.floor(Math.random() * errorSounds.length);
        const sound = errorSounds[randomIndex];
        sound.currentTime = 0;
        sound.play().catch(e => console.log("Erro ao tocar som de erro:", e));
    }

    // ==================== JOGO E ESTATÍSTICAS ====================
    let currentPlayerName = "";
    let gameState = {
        score: 0,
        questions: [],
        currentIndex: 0,
        multiplier: 1,
        startTime: 0,
        isGameOver: false,
        witchY: 60,
        witchX: 10,
        witchDir: 1,
        currentAnswer: "",
        canAttempt: true,
        isJornadaMaster: false,
        finalCalculatedScore: 0,
        totalErrors: 0,
        questionStartTime: 0,
        responseTimes: [],
        currentModalidadeKey: ""
    };
    let consecutiveHits = 0;
    let lastErrorQuestionKey = null;
    let errorCountForQuestion = 0;
    let totalPlayedWithAudio = 0;
    let nightModeCompleted = false;

    const VEL_H = 0.45, GRAVIDADE = 0.09, IMPULSO = 10, NUM_QUESTOES_MESTRE = 20;

    const opcoesOrdenadas = [
        { value: "1", label: "Tabuada do 1" }, { value: "2", label: "Tabuada do 2" },
        { value: "3", label: "Tabuada do 3" }, { value: "4", label: "Tabuada do 4" },
        { value: "5", label: "Tabuada do 5" }, { value: "6", label: "Tabuada do 6" },
        { value: "7", label: "Tabuada do 7" }, { value: "8", label: "Tabuada do 8" },
        { value: "9", label: "Tabuada do 9" }, { value: "10", label: "Tabuada do 10" },
        { value: "11", label: "Tabuada do 11" }, { value: "12", label: "Tabuada do 12" },
        { value: "mista1", label: "Mista Fácil (x2)" }, { value: "mista2", label: "Mista Difícil (x8)" },
        { value: "master", label: "🏆 JORNADA MESTRE SUPREMO (x15)" }
    ];

    window.onload = () => {
        const select = document.getElementById('tabuada-select');
        select.innerHTML = '';
        opcoesOrdenadas.forEach(opt => {
            let option = document.createElement('option');
            option.value = opt.value;
            option.innerText = opt.label;
            select.appendChild(option);
        });
        document.getElementById('btn-start').onclick = () => {
            const nameInput = document.getElementById('player-name-input').value.trim().toUpperCase();
            if (nameInput === "") {
                alert("Por favor, digite seu nome antes de iniciar!");
                return;
            }
            currentPlayerName = nameInput;
            startGame();
        };
        document.getElementById('btn-ranking').onclick = showRankingOnly;
        document.getElementById('btn-achievements').onclick = showPlayerList;
        loadGlobalStats();
    };

    function loadGlobalStats() {
        const stats = localStorage.getItem('bruxinha_stats_global');
        if (stats) {
            try {
                const s = JSON.parse(stats);
                totalPlayedWithAudio = s.totalPlayedWithAudio || 0;
                nightModeCompleted = s.nightModeCompleted || false;
            } catch(e) {}
        }
    }
    function saveGlobalStats() {
        localStorage.setItem('bruxinha_stats_global', JSON.stringify({
            totalPlayedWithAudio, nightModeCompleted
        }));
    }

    function startGame() {
        const type = document.getElementById('tabuada-select').value;
        const isSeq = document.querySelector('input[name="ordem"]:checked').value === 'seq';
        
        let modalidadeKey = type;
        if (type === 'mista1') modalidadeKey = 'mista_facil';
        else if (type === 'mista2') modalidadeKey = 'mista_dificil';
        else if (type !== 'master') modalidadeKey = `tabuada_${type}`;
        
        gameState = {
            score: 0,
            questions: [],
            currentIndex: 0,
            multiplier: type === 'master' ? 15 : (type === 'mista2' ? 8 : (type === 'mista1' ? 2 : parseInt(type))),
            startTime: Date.now(),
            isGameOver: false,
            witchY: 60,
            witchX: 10,
            witchDir: 1,
            currentAnswer: "",
            canAttempt: true,
            isJornadaMaster: type === 'master',
            finalCalculatedScore: 0,
            totalErrors: 0,
            questionStartTime: Date.now(),
            responseTimes: [],
            currentModalidadeKey: modalidadeKey
        };
        consecutiveHits = 0;
        lastErrorQuestionKey = null;
        errorCountForQuestion = 0;

        let rawQuestions = [];
        if(type === 'master') {
            for(let i=0; i<NUM_QUESTOES_MESTRE; i++) rawQuestions.push({ n1: Math.floor(Math.random()*13), n2: Math.floor(Math.random()*13), failed: false, pointsEarned: false, key: `m${i}` });
        } else if(!isNaN(type)) {
            let tab = parseInt(type);
            for(let i=0; i<=12; i++) rawQuestions.push({ n1: tab, n2: i, failed: false, pointsEarned: false, key: `${tab}x${i}` });
        } else {
            let start = type === 'mista1' ? 0 : 6;
            let end = type === 'mista1' ? 5 : 12;
            for(let i=start; i<=end; i++) {
                for(let j=0; j<=12; j++) rawQuestions.push({ n1: i, n2: j, failed: false, pointsEarned: false, key: `${i}x${j}` });
            }
            if(!isSeq) rawQuestions.sort(() => Math.random() - 0.5);
            rawQuestions = rawQuestions.slice(0, 15);
        }
        if(!isSeq && type !== 'master') rawQuestions.sort(() => Math.random() - 0.5);

        gameState.questions = rawQuestions;
        document.getElementById('witch').src = "bruxinha.gif";
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        document.getElementById('display-score').innerText = "0";
        document.body.focus();
        if(audioEnabled) { bgMusic.currentTime = 0; bgMusic.play().catch(e=>{}); }
        
        startPhysics();
        showQuestion();
    }

    function showQuestion() {
        if(gameState.currentIndex >= gameState.questions.length) { finish(true); return; }
        const q = gameState.questions[gameState.currentIndex];
        document.getElementById('question').innerText = `${q.n1} x ${q.n2}`;
        document.getElementById('answer-display').innerText = "?";
        document.getElementById('answer-display').className = "answer-box";
        document.getElementById('feedback').innerText = "";
        gameState.currentAnswer = "";
        gameState.canAttempt = true;
        gameState.questionStartTime = Date.now();
    }

    function getDigitsOfCorrectAnswer() {
        if (gameState.currentIndex >= gameState.questions.length) return 1;
        const q = gameState.questions[gameState.currentIndex];
        const correct = q.n1 * q.n2;
        return String(correct).length;
    }

    function handleNumpad(val) {
        if(gameState.isGameOver || !gameState.canAttempt) return;
        
        if(val === 'DEL') {
            gameState.currentAnswer = gameState.currentAnswer.slice(0,-1);
            document.getElementById('answer-display').innerText = gameState.currentAnswer || "?";
            return;
        }
        
        if(val === 'ENTER') {
            check();
            return;
        }
        
        if(gameState.currentAnswer.length < 4) {
            gameState.currentAnswer += val;
            document.getElementById('answer-display').innerText = gameState.currentAnswer;
        }
        
        const digitsNeeded = getDigitsOfCorrectAnswer();
        if (gameState.currentAnswer.length === digitsNeeded) {
            check();
        }
    }

    function check() {
        if(!gameState.canAttempt || gameState.currentAnswer === "") return;
        const q = gameState.questions[gameState.currentIndex];
        const correct = q.n1 * q.n2;
        const display = document.getElementById('answer-display');
        const fb = document.getElementById('feedback');
        const timeSpent = Date.now() - gameState.questionStartTime;
        gameState.responseTimes.push(timeSpent);

        if(parseInt(gameState.currentAnswer) === correct) {
            playRandomCorrectSound();
            consecutiveHits++;
            let earnedPoints = false;
            if(!q.failed && !q.pointsEarned) {
                let gain = Math.floor(1 * gameState.multiplier);
                gameState.score += gain;
                document.getElementById('display-score').innerText = gameState.score;
                q.pointsEarned = true;
                earnedPoints = true;
            }
            if (q.failed && !q.pointsEarned) {
                unlockAchievementForPlayer(currentPlayerName, 'resiliente');
            }
            if (lastErrorQuestionKey === q.key) errorCountForQuestion = 0;
            fb.innerText = earnedPoints ? `MUITO BEM! ✨ +${1 * gameState.multiplier}` : "CORRETO! (já aprendido, sem pontos)";
            fb.style.color = "var(--neon-green)";
            gameState.witchY = Math.min(gameState.witchY + IMPULSO, 80);
            gameState.currentIndex++;
            gameState.canAttempt = false;
            setTimeout(() => showQuestion(), 1200);
        } else {
            playRandomErrorSound();
            gameState.totalErrors++;
            consecutiveHits = 0;
            if (lastErrorQuestionKey === q.key) errorCountForQuestion++;
            else { lastErrorQuestionKey = q.key; errorCountForQuestion = 1; }
            fb.innerText = "OPS! OLHA SÓ:"; fb.style.color = "white";
            q.failed = true;
            display.innerText = "";
            display.className = "answer-box";
            setTimeout(() => { display.innerText = correct; display.classList.add('answer-reveal'); }, 300);
            gameState.witchY -= 5;
            document.getElementById('witch').src = "bruxinha-brava.gif";
            gameState.canAttempt = false;
            gameState.questions.push({...q, failed: true, pointsEarned: q.pointsEarned});
            setTimeout(() => {
                display.classList.remove('answer-reveal');
                document.getElementById('witch').src = "bruxinha.gif";
                gameState.currentIndex++;
                showQuestion();
            }, 3000);
        }
    }

    function startPhysics() {
        const loop = setInterval(() => {
            if(gameState.isGameOver) { clearInterval(loop); return; }
            gameState.witchX += (VEL_H * gameState.witchDir);
            if(gameState.witchX > 85) { gameState.witchDir = -1; document.getElementById('witch').style.transform = "scaleX(-1)"; }
            else if (gameState.witchX < 5) { gameState.witchDir = 1; document.getElementById('witch').style.transform = "scaleX(1)"; }
            gameState.witchY -= GRAVIDADE;
            document.getElementById('witch').style.left = gameState.witchX + "%";
            document.getElementById('witch').style.bottom = gameState.witchY + "%";
            if(gameState.witchY < 5) { gameState.isGameOver = true; handleCrash(); }
        }, 30);
    }

    function handleCrash() {
        bgMusic.pause();
        if(audioEnabled) sfxCrash.play().catch(e=>{});
        document.getElementById('witch').src = "bruxinha-caindo.gif";
        document.getElementById('feedback').innerText = "Oh-ouh!"; 
        document.getElementById('feedback').style.color = "red";
        setTimeout(() => finish(false), 2000);
    }

    function finish(success) {
        gameState.isGameOver = true;
        let finalScore = gameState.score;
        let perfectBonus = 0, masterBonus = 0;

        if (success && gameState.totalErrors === 0 && !gameState.isJornadaMaster) {
            perfectBonus = 1000;
            finalScore += perfectBonus;
            document.getElementById('perfect-badge').style.display = 'block';
            unlockAchievementForPlayer(currentPlayerName, 'perfeicao');
            updateVarredeiraProgress(currentPlayerName, gameState.currentModalidadeKey);
        } else {
            document.getElementById('perfect-badge').style.display = 'none';
        }
        if (success && gameState.isJornadaMaster && gameState.totalErrors === 0) {
            masterBonus = 5000;
            finalScore += masterBonus;
            document.getElementById('bonus-badge').style.display = 'block';
            unlockAchievementForPlayer(currentPlayerName, 'mestre_supremo');
            triggerMasterEffects();
        } else {
            document.getElementById('bonus-badge').style.display = 'none';
        }

        gameState.finalCalculatedScore = finalScore;
        if (success) unlockAchievementForPlayer(currentPlayerName, 'iniciante');
        
        let firstFive = gameState.responseTimes.slice(0,5);
        if (firstFive.length === 5) {
            let avg = firstFive.reduce((a,b)=>a+b,0)/5;
            if (avg < 3000) unlockAchievementForPlayer(currentPlayerName, 'relampago');
        }
        
        if (success && document.body.classList.contains('dark-mode')) {
            if (!nightModeCompleted) {
                nightModeCompleted = true;
                saveGlobalStats();
                unlockAchievementForPlayer(currentPlayerName, 'noturna');
            }
        }
        
        if (audioEnabled) totalPlayedWithAudio++;
        saveGlobalStats();
        if (totalPlayedWithAudio >= 10) unlockAchievementForPlayer(currentPlayerName, 'fa_audio');
        
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('ranking-view').style.display = 'none';
        document.getElementById('players-list-view').style.display = 'none';
        document.getElementById('highscore-input-area').style.display = 'block';
        document.getElementById('stats-summary').style.display = 'block';
        
        document.getElementById('current-player-name-display').innerText = currentPlayerName;
        const title = document.getElementById('modal-title');
        title.innerText = success ? "JORNADA CONCLUÍDA!" : "A BRUXINHA CAIU!";
        title.style.color = success ? "var(--neon-green)" : "var(--neon-red)";
        
        let summaryText = `Pontuação Base: ${gameState.score}<br>`;
        if(perfectBonus > 0) summaryText += `🎯 Bónus Perfeição: +${perfectBonus}<br>`;
        if(masterBonus > 0) summaryText += `✨ Bónus Mestre: +${masterBonus}<br>`;
        summaryText += `<strong>Total: ${finalScore}</strong><br>`;
        summaryText += `Erros cometidos: ${gameState.totalErrors}`;
        document.getElementById('modal-details').innerHTML = summaryText;
        
        if(audioEnabled) success ? sfxWin.play().catch(e=>{}) : sfxLose.play().catch(e=>{});
    }

    function triggerMasterEffects() {
        const me = document.getElementById('master-effect');
        me.style.display = 'block';
        for(let i=0; i<40; i++) {
            let star = document.createElement('div');
            star.innerText = ["⭐", "✨", "🎃", "🌟"][Math.floor(Math.random() * 4)];
            star.style.position = "absolute";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = "-50px";
            star.style.fontSize = (Math.random() * 20 + 20) + "px";
            star.style.transition = `top ${Math.random() * 3 + 2}s linear`;
            document.body.appendChild(star);
            setTimeout(() => star.style.top = "110vh", 100);
        }
    }

    // Função para obter o total de pontos individuais de um jogador no ranking
    function getPlayerTotalPoints(playerName) {
        const ranking = JSON.parse(localStorage.getItem('ranking_bruxinha_mestre') || "[]");
        const entry = ranking.find(r => r.name === playerName);
        return entry ? entry.score : 0;
    }

    function saveScore() {
        const currentScore = gameState.finalCalculatedScore;
        let ranking = JSON.parse(localStorage.getItem('ranking_bruxinha_mestre') || "[]");
        let existingIndex = -1;
        for (let i = 0; i < ranking.length; i++) {
            if (ranking[i].name === currentPlayerName) {
                existingIndex = i;
                break;
            }
        }
        if (existingIndex !== -1) ranking[existingIndex].score += currentScore;
        else ranking.push({ name: currentPlayerName, score: currentScore });
        ranking.sort((a, b) => b.score - a.score);
        if (ranking.length > 15) ranking = ranking.slice(0, 15);
        localStorage.setItem('ranking_bruxinha_mestre', JSON.stringify(ranking));
        
        // Atualiza conquista lendária com os pontos TOTAIS do jogador (após somar)
        const playerTotal = getPlayerTotalPoints(currentPlayerName);
        updateLendariaProgress(currentPlayerName, playerTotal);
        
        document.getElementById('highscore-input-area').style.display = 'none';
        document.getElementById('stats-summary').style.display = 'none';
        document.getElementById('ranking-view').style.display = 'block';
        renderRankingTable();
    }

    function renderRankingTable() {
        const ranking = JSON.parse(localStorage.getItem('ranking_bruxinha_mestre') || "[]");
        const table = document.getElementById('ranking-table');
        table.innerHTML = `<tr><th>#</th><th>NOME</th><th>PONTOS</th></tr>`;
        if (ranking.length === 0) table.innerHTML += `<tr><td colspan="3" style="text-align:center; padding:20px;">✨ Nenhum feiticeiro ainda ✨</td></tr>`;
        else ranking.forEach((r, i) => { table.innerHTML += `<tr><td class="rank-pos">${i+1}º</td><td class="player-name clickable-name" onclick="showAchievementsForPlayer('${r.name}')">${r.name}</td><td class="rank-score">${r.score}</td></tr>`; });
    }

    function showRankingOnly() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('stats-summary').style.display = 'none';
        document.getElementById('highscore-input-area').style.display = 'none';
        document.getElementById('ranking-view').style.display = 'block';
        document.getElementById('players-list-view').style.display = 'none';
        document.getElementById('achievements-view').style.display = 'none';
        document.getElementById('modal-title').innerText = "🏆 RANKING";
        renderRankingTable();
    }

    function showPlayerList() {
        const ranking = JSON.parse(localStorage.getItem('ranking_bruxinha_mestre') || "[]");
        const table = document.getElementById('players-table');
        table.innerHTML = `<tr><th>#</th><th>NOME</th><th>PONTOS TOTAIS</th></tr>`;
        if (ranking.length === 0) table.innerHTML += `<tr><td colspan="3">Nenhum jogador ainda</td></tr>`;
        else ranking.forEach((r, i) => {
            table.innerHTML += `<tr><td class="rank-pos">${i+1}º</td><td class="player-name clickable-name" onclick="showAchievementsForPlayer('${r.name}')">${r.name}</td><td class="rank-score">${r.score}</td></tr>`;
        });
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('ranking-view').style.display = 'none';
        document.getElementById('players-list-view').style.display = 'block';
        document.getElementById('achievements-view').style.display = 'none';
        document.getElementById('stats-summary').style.display = 'none';
        document.getElementById('highscore-input-area').style.display = 'none';
        document.getElementById('modal-title').innerText = "👥 JOGADORES";
    }

    function showAchievementsForPlayer(playerName) {
        const ach = getAchievementsForPlayer(playerName);
        const table = document.getElementById('achievements-table');
        table.innerHTML = `<tr><th>CONQUISTA</th><th>STATUS</th></tr>`;
        // Para exibir o progresso correto da Lendária, obtemos os pontos individuais do jogador no ranking
        const playerTotalPoints = getPlayerTotalPoints(playerName);
        for (let key in ach) {
            const a = ach[key];
            let statusText = a.unlocked ? '✅ DESBLOQUEADA' : '🔒 BLOQUEADA';
            let extra = '';
            if (key === 'varredeira' && !a.unlocked) {
                extra = `<div class="achieve-progress">Progresso: ${a.progress}/${a.needed} tabuadas perfeitas</div>`;
            } else if (key === 'lendaria') {
                // Usamos o total de pontos do jogador (individual) para mostrar o progresso
                const progress = playerTotalPoints;
                if (!a.unlocked) extra = `<div class="achieve-progress">Progresso: ${progress}/${a.needed} pontos</div>`;
                else extra = `<div class="achieve-progress">Total acumulado: ${progress} pontos</div>`;
            }
            const colorClass = a.unlocked ? 'achieve-unlocked' : 'achieve-locked';
            table.innerHTML += `<tr><td class="achieve-name">${a.name}<br><span style="font-size:1.4vh;">${a.desc}</span>${extra}</td><td class="${colorClass}">${statusText}</td></tr>`;
        }
        document.getElementById('achievements-player-name').innerHTML = `🏅 CONQUISTAS DE ${playerName}`;
        document.getElementById('players-list-view').style.display = 'none';
        document.getElementById('ranking-view').style.display = 'none';
        document.getElementById('achievements-view').style.display = 'block';
        document.getElementById('modal-title').innerText = `🏅 ${playerName}`;
    }

    function backToRanking() {
        document.getElementById('players-list-view').style.display = 'none';
        document.getElementById('ranking-view').style.display = 'block';
        document.getElementById('achievements-view').style.display = 'none';
        document.getElementById('modal-title').innerText = "🏆 RANKING";
        renderRankingTable();
    }

    function returnToMenu() {
        bgMusic.pause();
        bgMusic.currentTime = 0;
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('game-container').style.display = 'none';
        document.body.focus();
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => {});
        else document.exitFullscreen();
    }

    function toggleNightMode() {
        document.body.classList.toggle('dark-mode');
    }

    function toggleAudio() {
        audioEnabled = !audioEnabled;
        document.getElementById('btn-audio').innerText = audioEnabled ? "🔊" : "🔇";
        if(audioEnabled && document.getElementById('game-container').style.display === 'flex') bgMusic.play().catch(e=>{});
        else bgMusic.pause();
    }

    // Eventos de teclado
    document.addEventListener('keydown', (event) => {
        const modalVisible = document.getElementById('modal-overlay').style.display === 'flex';
        const rankingVisible = document.getElementById('ranking-view').style.display === 'block';
        const playersVisible = document.getElementById('players-list-view').style.display === 'block';
        const achievementsVisible = document.getElementById('achievements-view').style.display === 'block';
        const menuVisible = document.getElementById('menu').style.display === 'flex';
        const gameVisible = document.getElementById('game-container').style.display === 'flex';

        if (menuVisible && event.key === 'Enter') {
            event.preventDefault();
            document.getElementById('btn-start').click();
            return;
        }
        if (modalVisible) {
            if (rankingVisible && event.key === 'Enter') { event.preventDefault(); returnToMenu(); return; }
            if (playersVisible && event.key === 'Enter') { event.preventDefault(); returnToMenu(); return; }
            if (achievementsVisible && event.key === 'Enter') { event.preventDefault(); backToRanking(); return; }
        }
        if (gameVisible) {
            const key = event.key;
            if (key >= '0' && key <= '9') {
                event.preventDefault();
                handleNumpad(key);
            } else if (key === 'Enter') {
                event.preventDefault();
                handleNumpad('ENTER');
            } else if (key === 'Backspace') {
                event.preventDefault();
                handleNumpad('DEL');
            }
        }
    });
</script>
</body>
</html>
