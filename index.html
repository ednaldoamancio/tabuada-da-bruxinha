<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>EdHumanas</title>

<style>
:root {
    --hw-orange: #ff9900;
    --neon-green: #25a10d;
    --bg-filter: brightness(0.4) grayscale(0.3);
    color: #ccc;
}

body { 
    margin: 0; padding: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif; 
    background: #000; color: white; 
    overflow: hidden; 
    width: 100vw; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    touch-action: none; 
}

#game-wrapper { 
    width: 100%; height: 100%; position: relative; 
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    transition: filter 0.3s;
    overflow: hidden;
}

/* VÍDEO DE FUNDO (LOOP NATIVO) */
#bg-video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: 1;
    transform: translate(-50%, -50%);
    object-fit: cover;
    filter: var(--bg-filter);
    transition: filter 0.3s;
}
</style>
</head>

<body>

<div id="game-wrapper">

    <!-- LOOP LIMPO VIA HTML -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="fundo_halloween.mp4" type="video/mp4">
    </video>

</div>

<script>
    // 🔥 REMOVIDO COMPLETAMENTE:
    // video.addEventListener('timeupdate', ...)

    // Mantemos apenas referência ao vídeo se precisar no futuro
    const video = document.getElementById('bg-video');
</script>

</body>
</html>
